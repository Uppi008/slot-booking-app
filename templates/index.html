<!DOCTYPE html>
<html>

<head>
    <title>Slot Booking System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Ensure particles are behind content */
        .particle {
            z-index: 0;
        }
        .max-w-7xl {
            position: relative;
            z-index: 2;
        }
        nav {
            position: relative;
            z-index: 10;
        }
    </style>
</head>

<body>
    <!-- Animated particles for background -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <!-- Navigation -->
    <nav>
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <h1 class="text-xl font-bold">
                        <i class="fas fa-calendar-check mr-2"></i>SlotBooking
                    </h1>
                    <div class="hidden md:flex space-x-4">
                        <a href="/" class="px-3 py-2 rounded-md text-sm font-medium">
                            <i class="fas fa-home mr-1"></i>Home
                        </a>
                        <a href="#" id="myBookingsBtn" class="px-3 py-2 rounded-md text-sm font-medium">
                            <i class="fas fa-list mr-1"></i>My Bookings
                        </a>
                        <a href="#" id="adminPanelBtn" class="px-3 py-2 rounded-md text-sm font-medium hidden">
                            <i class="fas fa-cog mr-1"></i>Admin Panel
                        </a>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm" id="welcomeUser"></span>
                    <button onclick="logout()" class="px-4 py-2 rounded-lg text-sm font-medium transition">
                        <i class="fas fa-sign-out-alt mr-1"></i>Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="max-w-7xl mx-auto mt-8 px-4">

        <!-- Date Selection -->
        <div class="rounded-xl p-6 mb-6">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between">
                <div class="mb-4 md:mb-0">
                    <h2 class="text-2xl font-bold">
                        <i class="fas fa-clock mr-2"></i>Available Slots
                    </h2>
                    <p class="mt-1">Select a date to view available time slots</p>
                </div>
                <div class="flex flex-col sm:flex-row gap-4">
                    <div>
                        <label for="datePicker" class="block text-sm font-medium mb-1">Select Date</label>
                        <input type="date" id="datePicker" class="border rounded-lg px-4 py-2 focus:outline-none focus:ring-2">
                    </div>
                    <div class="flex items-end">
                        <button onclick="loadSlots()" class="px-6 py-2 rounded-lg transition">
                            <i class="fas fa-search mr-2"></i>View Slots
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats Cards (Visible only to admin) -->
        <div id="adminStats" class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6 hidden">
            <div class="rounded-xl p-6">
                <div class="flex items-center">
                    <div class="p-3 rounded-full">
                        <i class="fas fa-clock text-xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm">Total Slots</p>
                        <p class="text-2xl font-bold" id="totalSlots">0</p>
                    </div>
                </div>
            </div>
            <div class="rounded-xl p-6">
                <div class="flex items-center">
                    <div class="p-3 rounded-full">
                        <i class="fas fa-check-circle text-xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm">Available</p>
                        <p class="text-2xl font-bold" id="availableSlots">0</p>
                    </div>
                </div>
            </div>
            <div class="rounded-xl p-6">
                <div class="flex items-center">
                    <div class="p-3 rounded-full">
                        <i class="fas fa-bookmark text-xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm">Booked</p>
                        <p class="text-2xl font-bold" id="bookedSlots">0</p>
                    </div>
                </div>
            </div>
            <div class="rounded-xl p-6">
                <div class="flex items-center">
                    <div class="p-3 rounded-full">
                        <i class="fas fa-users text-xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm">Total Users</p>
                        <p class="text-2xl font-bold" id="totalUsers">0</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Slots Table -->
        <div class="rounded-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full">
                    <thead>
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">
                                <i class="fas fa-calendar mr-1"></i>Date
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">
                                <i class="fas fa-clock mr-1"></i>Time
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">
                                <i class="fas fa-info-circle mr-1"></i>Status
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">
                                <i class="fas fa-user mr-1"></i>Booked By
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider">
                                <i class="fas fa-cog mr-1"></i>Actions
                            </th>
                        </tr>
                    </thead>
                    <tbody id="slotTable" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal for adding/editing slots -->
    <div id="slotModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden overflow-y-auto h-full w-full z-50">
        <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-md">
            <div class="mt-3">
                <h3 class="text-lg font-medium leading-6 mb-4" id="modalTitle">Add New Slot</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Date</label>
                        <input type="date" id="modalDate" class="mt-1 block w-full border rounded-md shadow-sm p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Time</label>
                        <select id="modalTime" class="mt-1 block w-full border rounded-md shadow-sm p-2">
                            <option value="09:00 AM - 10:00 AM">09:00 AM - 10:00 AM</option>
                            <option value="10:00 AM - 11:00 AM">10:00 AM - 11:00 AM</option>
                            <option value="11:00 AM - 12:00 PM">11:00 AM - 12:00 PM</option>
                            <option value="12:00 PM - 01:00 PM">12:00 PM - 01:00 PM</option>
                            <option value="01:00 PM - 02:00 PM">01:00 PM - 02:00 PM</option>
                            <option value="02:00 PM - 03:00 PM">02:00 PM - 03:00 PM</option>
                            <option value="03:00 PM - 04:00 PM">03:00 PM - 04:00 PM</option>
                            <option value="04:00 PM - 05:00 PM">04:00 PM - 05:00 PM</option>
                        </select>
                    </div>
                    <div id="statusField" class="hidden">
                        <label class="block text-sm font-medium mb-2">Status</label>
                        <select id="modalStatus" class="mt-1 block w-full border rounded-md shadow-sm p-2">
                            <option value="available">Available</option>
                            <option value="booked">Booked</option>
                            <option value="cancelled">Cancelled</option>
                        </select>
                    </div>
                </div>
                <div class="flex justify-end space-x-3 mt-6">
                    <button onclick="closeModal()" class="px-4 py-2 rounded-md text-sm font-medium">
                        Cancel
                    </button>
                    <button onclick="saveSlot()" class="px-4 py-2 rounded-md text-sm font-medium">
                        Save
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
